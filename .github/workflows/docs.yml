name: docs

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  generated-docs-check:
    name: generated docs check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native

      - name: Check generated docs
        run: make docs-check

  markdown-lint:
    name: markdown lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            README.md
            CHANGELOG.md
            docs/**/*.md

  links-check:
    name: link check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --exclude '^http://127\.0\.0\.1'
            --exclude '^https://127\.0\.0\.1'
            --exclude '^http://localhost'
            --exclude '^https://localhost'
            README.md CHANGELOG.md docs/**/*.md
          fail: true

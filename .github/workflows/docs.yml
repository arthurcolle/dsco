name: docs

on:
  pull_request:
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '*.h'
      - 'tools.c'
      - 'scripts/gen_*.sh'
      - '.github/workflows/docs.yml'
  push:
    branches: [main, master]
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '*.h'
      - 'tools.c'
      - 'scripts/gen_*.sh'
      - '.github/workflows/docs.yml'

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # GENERATED DOCS CHECK
  # Ensures API reference and tool catalog are up to date
  # ─────────────────────────────────────────────────────────────────────
  generated-docs-check:
    name: generated docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Check API reference is up to date
        run: |
          chmod +x scripts/gen_api_reference.sh 2>/dev/null || true
          ./scripts/gen_api_reference.sh --check || echo "Warning: API ref check skipped (script not found)"

      - name: Check tool catalog is up to date
        run: |
          chmod +x scripts/gen_tool_catalog.sh 2>/dev/null || true
          ./scripts/gen_tool_catalog.sh --check || echo "Warning: tool catalog check skipped (script not found)"

  # ─────────────────────────────────────────────────────────────────────
  # MARKDOWN LINT
  # ─────────────────────────────────────────────────────────────────────
  markdown-lint:
    name: markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            README.md
            CHANGELOG.md
            docs/**/*.md

  # ─────────────────────────────────────────────────────────────────────
  # LINK CHECK
  # ─────────────────────────────────────────────────────────────────────
  links-check:
    name: link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --exclude '^http://127\.0\.0\.1'
            --exclude '^https://127\.0\.0\.1'
            --exclude '^http://localhost'
            --exclude '^https://localhost'
            README.md CHANGELOG.md docs/**/*.md
          fail: true

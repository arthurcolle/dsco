name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # BUILD PLATFORM BINARIES
  # These assets are consumed by npm/dsco/scripts/install.js.
  # Expected names:
  #   dsco-darwin-arm64.tar.gz
  #   dsco-darwin-x64.tar.gz
  #   dsco-linux-x64.tar.gz
  # ─────────────────────────────────────────────────────────────────────
  build-binaries:
    name: build binary (${{ matrix.triple }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            triple: darwin-arm64
            arch: arm64
            deps: brew
          - runner: macos-13
            triple: darwin-x64
            arch: x86-64
            deps: brew
          - runner: ubuntu-latest
            triple: linux-x64
            arch: x86-64
            deps: apt
    env:
      CC: ${{ matrix.runner == 'ubuntu-latest' && 'gcc' || 'clang' }}
      DSCO_ARCH: ${{ matrix.arch }}
      DSCO_STD: c2y
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.deps == 'apt'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libcurl4-openssl-dev libsqlite3-dev libreadline-dev \
            libsodium-dev libuv1-dev libmbedtls-dev libhiredis-dev

      - name: Install dependencies (macOS)
        if: matrix.deps == 'brew'
        run: |
          brew update
          brew install hiredis libsodium libuv mbedtls@3 readline pkg-config

      - name: Build
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) dsco dsco-lite dsc

      - name: Smoke test
        run: |
          ./dsco --version
          ./dsco --tool-exec cwd '{}'

      - name: Package binaries
        run: |
          mkdir -p dist
          tar czf dist/dsco-${{ matrix.triple }}.tar.gz dsco dsco-lite dsc
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dist/dsco-${{ matrix.triple }}.tar.gz > dist/dsco-${{ matrix.triple }}.tar.gz.sha256
          else
            shasum -a 256 dist/dsco-${{ matrix.triple }}.tar.gz > dist/dsco-${{ matrix.triple }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsco-${{ matrix.triple }}
          path: dist/

  # ─────────────────────────────────────────────────────────────────────
  # BUILD SOURCE TARBALL
  # This is what the Homebrew formula downloads.
  # ─────────────────────────────────────────────────────────────────────
  build-source:
    name: build source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          git archive --format=tar.gz --prefix="dsco-${VERSION}/" \
            -o dist/dsco-${VERSION}.tar.gz HEAD
          sha256sum dist/dsco-${VERSION}.tar.gz > dist/dsco-${VERSION}.tar.gz.sha256

          echo "## Source Tarball" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat dist/dsco-${VERSION}.tar.gz.sha256 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsco-source
          path: dist/

  # ─────────────────────────────────────────────────────────────────────
  # CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────────────────────────────
  create-release:
    name: create GitHub release
    needs: [build-binaries, build-source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing $TAG (version $VERSION)"

      - name: Extract changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk '/^## \['"${VERSION}"'\]/{found=1} found{print} /^## \[/ && !/^## \['"${VERSION}"'\]/{if(found)exit}' CHANGELOG.md | head -200 > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "DSCO ${{ steps.version.outputs.tag }}" > /tmp/release_notes.md
          fi

      - name: List artifacts
        run: |
          find dist/ -type f | sort
          echo "--- SHA256 ---"
          cat dist/*.sha256 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DSCO ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: false

  # ─────────────────────────────────────────────────────────────────────
  # UPDATE HOMEBREW TAP
  # Requires repo secret HOMEBREW_TAP_TOKEN.
  # ─────────────────────────────────────────────────────────────────────
  update-homebrew:
    name: update Homebrew tap
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-dsco tap
        uses: actions/checkout@v4
        with:
          repository: arthurcolle/homebrew-dsco
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download source tarball SHA256
        uses: actions/download-artifact@v4
        with:
          name: dsco-source
          path: dist/

      - name: Update formula and cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA256=$(cut -d' ' -f1 dist/dsco-${VERSION}.tar.gz.sha256)
          URL="https://github.com/arthurcolle/dsco/archive/refs/tags/${TAG}.tar.gz"

          FORMULA_FILE="homebrew-tap/Formula/dsco.rb"
          sed -i "s|url .*|url \"${URL}\"|" "$FORMULA_FILE"
          sed -i "s|sha256 .*|sha256 \"${SHA256}\"|" "$FORMULA_FILE"

          if [ -f "homebrew-tap/Casks/dsco.rb" ]; then
            sed -i "s|version .*|version \"${VERSION}\"|" "homebrew-tap/Casks/dsco.rb"
            sed -i "s|sha256 .*|sha256 \"${SHA256}\"|" "homebrew-tap/Casks/dsco.rb"
          fi

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "dsco ${{ steps.version.outputs.tag }} — auto-update formula" || exit 0
          git push

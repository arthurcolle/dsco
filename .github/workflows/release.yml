name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v1.0.2'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  DSCO_CI: "1"
  DSCO_NO_SUPERVISE: "1"
  DSCO_SECURE_STORE_NO_PROMPT: "1"
  DSCO_STD: c2y

jobs:
  validate-release:
    name: validate release inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: npm/dsco/package.json

      - name: Validate tag, changelog, and package metadata
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3; got '$TAG'" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          CONFIG_VERSION="$(sed -nE 's/^#define[[:space:]]+DSCO_VERSION[[:space:]]+"([^"]+)".*/\1/p' include/config.h | head -n1)"
          NPM_VERSION="$(node -p "require('./npm/dsco/package.json').version")"

          [[ "$CONFIG_VERSION" == "$VERSION" ]] || {
            echo "include/config.h has $CONFIG_VERSION but tag is $TAG" >&2
            exit 1
          }
          [[ "$NPM_VERSION" == "$VERSION" ]] || {
            echo "npm/dsco/package.json has $NPM_VERSION but tag is $TAG" >&2
            exit 1
          }
          grep -Eq "^## \[$VERSION\]([[:space:]]|$)" CHANGELOG.md || {
            echo "CHANGELOG.md is missing section [$VERSION]" >&2
            exit 1
          }
          git rev-parse --verify --quiet "$TAG^{commit}" >/dev/null

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Validated DSCO $TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate npm package dry run
        working-directory: npm/dsco
        env:
          DSCO_SKIP_DOWNLOAD: "1"
        run: npm pack --dry-run

  build-binaries:
    name: build binary (${{ matrix.triple }})
    needs: validate-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            triple: darwin-arm64
            arch: arm64
            cc: clang
          - runner: macos-15-intel
            triple: darwin-x64
            arch: x86-64
            cc: clang
          - runner: ubuntu-24.04
            triple: linux-x64
            arch: x86-64
            cc: gcc
    env:
      CC: ${{ matrix.cc }}
      DSCO_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.tag }}

      - uses: ./.github/actions/setup-native

      - name: Build
        run: |
          set -euo pipefail
          NCPU="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu)"
          make -j"${NCPU}" dsco dsco-lite dsc

      - name: Smoke test
        run: |
          set -euo pipefail
          ./dsco --version
          ./dsco-lite --version
          ./dsco --tool-exec cwd '{}'

      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          tar czf "dist/dsco-${{ matrix.triple }}.tar.gz" dsco dsco-lite dsc README.md LICENSE
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/dsco-${{ matrix.triple }}.tar.gz" > "dist/dsco-${{ matrix.triple }}.tar.gz.sha256"
          else
            shasum -a 256 "dist/dsco-${{ matrix.triple }}.tar.gz" > "dist/dsco-${{ matrix.triple }}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsco-${{ matrix.triple }}
          path: dist/dsco-${{ matrix.triple }}.tar.gz*
          if-no-files-found: error

  build-source:
    name: build source tarball
    needs: validate-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Create source tarball
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          TAG="${{ needs.validate-release.outputs.tag }}"
          mkdir -p dist
          git archive --format=tar.gz --prefix="dsco-${VERSION}/" \
            -o "dist/dsco-${VERSION}.tar.gz" "$TAG"
          sha256sum "dist/dsco-${VERSION}.tar.gz" > "dist/dsco-${VERSION}.tar.gz.sha256"

          {
            echo "## Source Tarball"
            echo '```'
            cat "dist/dsco-${VERSION}.tar.gz.sha256"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsco-source
          path: dist/dsco-${{ needs.validate-release.outputs.version }}.tar.gz*
          if-no-files-found: error

  create-release:
    name: create GitHub release
    needs: [validate-release, build-binaries, build-source]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract changelog
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          awk '/^## \['"${VERSION}"'\]/{found=1} found{print} /^## \[/ && !/^## \['"${VERSION}"'\]/{if(found)exit}' CHANGELOG.md | head -200 > /tmp/release_notes.md
          if [[ ! -s /tmp/release_notes.md ]]; then
            echo "No changelog notes found for $VERSION" >&2
            exit 1
          fi

      - name: Verify release assets
        run: |
          set -euo pipefail
          expected=(
            "dsco-darwin-arm64.tar.gz"
            "dsco-darwin-x64.tar.gz"
            "dsco-linux-x64.tar.gz"
            "dsco-${{ needs.validate-release.outputs.version }}.tar.gz"
          )
          for asset in "${expected[@]}"; do
            test -f "dist/$asset"
            test -f "dist/$asset.sha256"
          done
          find dist/ -type f | sort
          echo "--- SHA256 ---"
          cat dist/*.sha256

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.tag }}
          name: DSCO ${{ needs.validate-release.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: false

  update-homebrew:
    name: update Homebrew tap
    needs: [validate-release, create-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check tap token
        id: tap-token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout homebrew-dsco tap
        if: steps.tap-token.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          repository: arthurcolle/homebrew-dsco
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download source tarball SHA256
        if: steps.tap-token.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dsco-source
          path: dist/

      - name: Update formula and cask
        if: steps.tap-token.outputs.configured == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          TAG="${{ needs.validate-release.outputs.tag }}"
          SHA256="$(cut -d' ' -f1 "dist/dsco-${VERSION}.tar.gz.sha256")"
          URL="https://github.com/arthurcolle/dsco/releases/download/${TAG}/dsco-${VERSION}.tar.gz"

          FORMULA_FILE="homebrew-tap/Formula/dsco.rb"
          test -f "$FORMULA_FILE"
          sed -i "s|^[[:space:]]*url .*|  url \"${URL}\"|" "$FORMULA_FILE"
          sed -i "s|^[[:space:]]*sha256 .*|  sha256 \"${SHA256}\"|" "$FORMULA_FILE"

          CASK_FILE="homebrew-tap/Casks/dsco.rb"
          if [[ -f "$CASK_FILE" ]]; then
            sed -i "s|^[[:space:]]*version .*|  version \"${VERSION}\"|" "$CASK_FILE"
            sed -i "s|^[[:space:]]*sha256 .*|  sha256 \"${SHA256}\"|" "$CASK_FILE"
          fi

      - name: Commit and push
        if: steps.tap-token.outputs.configured == 'true'
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Homebrew tap already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "dsco ${{ needs.validate-release.outputs.tag }} release"
          git push

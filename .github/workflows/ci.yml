name: ci

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DSCO_CI: "1"
  DSCO_NO_SUPERVISE: "1"
  DSCO_SECURE_STORE_NO_PROMPT: "1"
  DSCO_STD: c2y

jobs:
  build-test:
    name: build-test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-24.04-gcc
            os: ubuntu-24.04
            cc: gcc
            arch: x86-64
          - label: ubuntu-24.04-clang
            os: ubuntu-24.04
            cc: clang
            arch: x86-64
          - label: macos-14-clang-arm64
            os: macos-14
            cc: clang
            arch: arm64
          - label: macos-15-intel-clang-x64
            os: macos-15-intel
            cc: clang
            arch: x86-64
    env:
      CC: ${{ matrix.cc }}
      DSCO_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native

      - name: Build release binaries
        run: |
          set -euo pipefail
          NCPU="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu)"
          make -j"${NCPU}" dsco dsco-lite dsc

      - name: Smoke test binaries
        run: |
          set -euo pipefail
          ./dsco --version
          ./dsco-lite --version
          ./dsco --tool-exec cwd '{}'
          ./dsc --help >/dev/null

      - name: Unit tests
        run: make test

      - name: Upload CI binaries
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ci-binaries-${{ matrix.label }}
          path: |
            dsco
            dsco-lite
            dsc
          if-no-files-found: error
          retention-days: 7

  extended-tests:
    name: extended standalone tests
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CC: gcc
      DSCO_ARCH: x86-64
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native

      - name: Run standalone suites
        run: |
          set -euo pipefail
          make test_tui_snapshots
          make test_priorities

  sanitizers:
    name: sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]
    env:
      CC: clang
      DSCO_ARCH: x86-64
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native

      - name: Build and test with ${{ matrix.sanitizer }}
        run: |
          set -euo pipefail
          make clean
          make ${{ matrix.sanitizer }}
          make ${{ matrix.sanitizer }}-test

  static-analysis:
    name: static-analysis (${{ matrix.tool }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        tool: [clang-tidy, cppcheck]
    env:
      CC: clang
      DSCO_ARCH: x86-64
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native
        with:
          static-analysis: "true"

      - name: Run ${{ matrix.tool }}
        run: make ${{ matrix.tool }}

  hygiene:
    name: repo hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-native
        with:
          format: "true"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: npm/dsco/package.json

      - name: Formatting, docs, and version checks
        run: |
          set -euo pipefail
          make format-check
          make docs-check
          make check-version

      - name: Validate npm package contents
        working-directory: npm/dsco
        env:
          DSCO_SKIP_DOWNLOAD: "1"
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if (p.name !== '@distributed.systems/dsco') throw new Error('unexpected package name');"
          npm pack --dry-run

name: ci

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # BUILD + TEST MATRIX
  # Tests every supported OS/compiler combo. Uses CI-safe flags.
  # ─────────────────────────────────────────────────────────────────────
  build-and-test:
    name: build-test (${{ matrix.os }}, ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
          - os: macos-13
            cc: clang
    env:
      CC: ${{ matrix.cc }}
      DSCO_ARCH: x86-64
      DSCO_STD: c2y
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libsqlite3-dev libreadline-dev \
            libsodium-dev libuv1-dev libmbedtls-dev libhiredis-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install hiredis libsodium libuv mbedtls@3 readline pkg-config

      - name: Build (release)
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) dsco dsco-lite dsc

      - name: Smoke test
        run: |
          ./dsco --version
          ./dsco --tool-exec cwd '{}'
          ./dsc --help || true

      - name: Unit tests
        run: make test

  # ─────────────────────────────────────────────────────────────────────
  # SANITIZERS (ASan + UBSan)
  # Catches memory errors and undefined behavior.
  # ─────────────────────────────────────────────────────────────────────
  sanitizers:
    name: sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]
    env:
      CC: clang
      DSCO_ARCH: x86-64
      DSCO_STD: c2y
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang libcurl4-openssl-dev libsqlite3-dev libreadline-dev \
            libsodium-dev libuv1-dev libmbedtls-dev libhiredis-dev

      - name: Build and test with ${{ matrix.sanitizer }}
        run: |
          make clean
          make ${{ matrix.sanitizer }}
          make ${{ matrix.sanitizer }}-test

  # ─────────────────────────────────────────────────────────────────────
  # STATIC ANALYSIS
  # ─────────────────────────────────────────────────────────────────────
  static-analysis:
    name: ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [clang-tidy, cppcheck]
    env:
      CC: clang
      DSCO_ARCH: x86-64
      DSCO_STD: c2y
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang clang-tidy cppcheck \
            libcurl4-openssl-dev libsqlite3-dev libreadline-dev \
            libsodium-dev libuv1-dev libmbedtls-dev libhiredis-dev

      - name: Run ${{ matrix.tool }}
        run: make ${{ matrix.tool }}

  # ─────────────────────────────────────────────────────────────────────
  # FORMAT CHECK
  # ─────────────────────────────────────────────────────────────────────
  format-check:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: make format-check

  # ─────────────────────────────────────────────────────────────────────
  # VERSION CONSISTENCY
  # Ensures config.h, CHANGELOG.md, and git tags all agree.
  # ─────────────────────────────────────────────────────────────────────
  version-check:
    name: version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          chmod +x scripts/check_version_consistency.sh
          ./scripts/check_version_consistency.sh

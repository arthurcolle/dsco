name: stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # STALE ISSUE / PR MANAGEMENT
  # Closes inactive issues after 60 days, PRs after 30 days.
  # ─────────────────────────────────────────────────────────────────────
  stale:
    name: close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been inactive for 60 days and is being marked as stale.
            If this is still relevant, please comment to keep it open.
            Otherwise it will be closed in 14 days.
          close-issue-message: |
            This issue was closed due to inactivity. Feel free to reopen if still relevant.
          exempt-issue-labels: 'pinned,security,enhancement,roadmap'

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been inactive for 30 days and is being marked as stale.
            If you're still working on this, please comment or push updates.
            Otherwise it will be closed in 14 days.
          close-pr-message: |
            This PR was closed due to inactivity. Feel free to reopen when ready.
          exempt-pr-labels: 'pinned,security,dependencies'

          # General
          operations-per-run: 30

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint-cli2.yaml"]

  - repo: local
    hooks:
      - id: docs-check
        name: docs-check
        entry: make docs-check
        language: system
        pass_filenames: false

      - id: check-version
        name: check-version
        entry: ./scripts/check_version_consistency.sh
        language: system
        pass_filenames: false

      - id: clang-format-check
        name: clang-format-check
        entry: ./scripts/clang_format_check.sh
        language: system
        pass_filenames: false
